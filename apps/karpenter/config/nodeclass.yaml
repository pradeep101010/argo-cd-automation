apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2@latest
  role: KarpenterNodeRole
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: modmed-pod-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: modmed-pod-cluster
  tags:
    managed-by: karpenter
    provisioned-by: argocd
